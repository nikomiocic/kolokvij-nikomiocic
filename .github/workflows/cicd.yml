name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
  OCIR_NAMESPACE: ${{ secrets.OCIR_NAMESPACE }}
  OCIR_REGION_KEY: fra
  OCIR_REPO: kolokvij/app
  IMAGE_TAG: ${{ github.sha }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build with Maven
      run: |
        chmod +x mvnw
        ./mvnw -B package -DskipTests

    - name: Login to OCIR
      run: |
        echo "${{ secrets.OCI_AUTH_TOKEN }}" | docker login fra.ocir.io -u "${{ secrets.OCIR_NAMESPACE }}/nmiocic22@unizd.hr" --password-stdin

    - name: Build and Push Docker image
      run: |
        IMAGE="${OCIR_REGION_KEY}.ocir.io/${OCIR_NAMESPACE}/${OCIR_REPO}"
        docker build -t "${IMAGE}:${IMAGE_TAG}" -t "${IMAGE}:latest" .
        docker push "${IMAGE}:${IMAGE_TAG}"
        docker push "${IMAGE}:latest"

  deploy:
    name: Deploy na OKE
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Configure kubectl za OKE
      uses: oracle-actions/configure-kubectl-oke@v1.5.0
      with:
        cluster: ${{ secrets.OKE_CLUSTER_OCID }}

    - name: Update image i apply manifest
      run: |
        IMAGE="${OCIR_REGION_KEY}.ocir.io/${OCIR_NAMESPACE}/${OCIR_REPO}:${IMAGE_TAG}"
        sed -i "s|IMAGE_PLACEHOLDER|${IMAGE}|g" k8s/kolokvij-deploy.yaml
        kubectl apply -f k8s/kolokvij-deploy.yaml

    - name: Verify rollout
      run: kubectl rollout status deployment/kolokvij --timeout=5m

    - name: Smoke test
      run: |
        EXT_IP=""
        for i in $(seq 1 30); do
          EXT_IP=$(kubectl get svc kolokvij-lb -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          [ -n "${EXT_IP}" ] && [ "${EXT_IP}" != "<pending>" ] && break
          echo "Čekam Load Balancer IP... (${i}/30)"
          sleep 10
        done
        if [ -z "${EXT_IP}" ]; then echo "Timeout"; exit 1; fi
        curl --fail --max-time 10 "http://${EXT_IP}:8080/hello/Kolokvij"
    - name: Smoke test
      run: |
        EXT_IP=""
        for i in $(seq 1 30); do
          EXT_IP=$(kubectl get svc kolokvij-lb -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          [ -n "${EXT_IP}" ] && [ "${EXT_IP}" != "<pending>" ] && break
          echo "Čekam Load Balancer IP... (${i}/30)"
          sleep 10
        done
        
        echo "IP je ${EXT_IP}. Čekam da aplikacija odgovori..."
        for i in $(seq 1 10); do
          curl -f "http://${EXT_IP}:8080/hello/Kolokvij" && exit 0
          echo "Aplikacija još nije spremna, čekam 10s... (${i}/10)"
          sleep 10
        done
        echo "Smoke test nije uspio!"
        exit 1
