name: CI/CD Spring Boot na OCIR

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'oracle'
        java-version: '17'

    - name: Dozvola za pokretanje Maven Wrappera
      run: chmod +x mvnw

    - name: Build i test
      run: ./mvnw -B package

    - name: Upload JAR artifact
      if: success()
      uses: actions/upload-artifact@v7
      with:
        name: spring-helloworld-jar
        path: target/*.jar
