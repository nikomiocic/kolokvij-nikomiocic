name: CI/CD Spring Boot na OCIR

on:
  push:
    branches: [ "main" ]
  pull_request: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
  OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
  OCIR_NAMESPACE: ${{ secrets.OCIR_NAMESPACE }}
  OCIR_REGION_KEY: fra
  OCIR_REPO: spring-projects/spring-boot-hello-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'oracle'
        java-version: '17'

    - name: Dozvola za pokretanje Maven Wrappera
      run: chmod +x mvnw

    - name: Build i test
      run: ./mvnw -B package

    - name: Upload JAR artifact
      if: success()
      uses: actions/upload-artifact@v7
      with:
        name: spring-helloworld-jar
        path: target/*.jar

    - name: Login to OCIR (Standard Docker)
      if: github.event_name == 'push'
      run: |
        echo "${{ secrets.OCI_AUTH_TOKEN }}" | docker login ${OCIR_REGION_KEY}.ocir.io -u "${OCIR_NAMESPACE}/${OCI_CLI_USER}" --password-stdin

    - name: Build i push Docker slike
      if: github.event_name == 'push'
      run: |
        IMAGE="${OCIR_REGION_KEY}.ocir.io/${OCIR_NAMESPACE}/${OCIR_REPO}"
        docker build -t "${IMAGE}:${IMAGE_TAG}" -t "${IMAGE}:latest" .
        docker push "${IMAGE}:${IMAGE_TAG}"
        docker push "${IMAGE}:latest"

  deploy:
    name: Deploy na OKE
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    # Službena Oracle akcija za automatsko spajanje na tvoj Kubernetes klaster
    - name: Configure kubectl za OKE
      uses: oracle-actions/configure-kubectl-oke@v1.5.0
      with:
        cluster: ${{ secrets.OKE_CLUSTER_OCID }}

    # Mijenjamo PLACEHOLDER u manifestu s točnom i svježom Docker slikom
    - name: Update image i apply manifest
      run: |
        IMAGE="${OCIR_REGION_KEY}.ocir.io/${OCIR_NAMESPACE}/${OCIR_REPO}:${IMAGE_TAG}"
        sed -i "s|IMAGE_PLACEHOLDER|${IMAGE}|g" k8s/sbapp-deploy.yaml
        kubectl apply -f k8s/sbapp-deploy.yaml

    # Čekamo do 5 minuta da Kubernetes uspješno pokrene sve kontejnere
    - name: Verify rollout
      run: kubectl rollout status deployment/sbapp --timeout=5m

    # Smoke test: Čekamo da Load Balancer dobije javnu IP adresu i šaljemo curl zahtjev
    - name: Smoke test /hostname
      run: |
        EXT_IP=""
        for i in $(seq 1 30); do
          EXT_IP=$(kubectl get svc sbapp-lb -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          [ -n "${EXT_IP}" ] && break
          echo "Čekam Load Balancer IP... (${i}/30)"
          sleep 10
        done
        if [ -z "${EXT_IP}" ]; then
          echo "Load Balancer nije dobio IP u 5 minuta"
          exit 1
        fi
        echo "Aplikacija je na http://${EXT_IP}:8080/hostname"
        curl --fail --max-time 10 "http://${EXT_IP}:8080/hostname"
