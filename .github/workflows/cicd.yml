name: CI/CD Spring Boot na OCIR

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
  OCIR_NAMESPACE: ${{ secrets.OCIR_NAMESPACE }}
  OCIR_REGION_KEY: fra
  OCIR_REPO: spring-projects/spring-boot-hello-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'oracle'
        java-version: '17'

    - name: Dozvola za pokretanje Maven Wrappera
      run: chmod +x mvnw

    - name: Build i test
      run: ./mvnw -B package

    - name: Upload JAR artifact
      if: success()
      uses: actions/upload-artifact@v7
      with:
        name: spring-helloworld-jar
        path: target/*.jar

    # Čisti, neprobojni Docker login koji zaobilazi sve bugove Oracle akcije
    - name: Login to OCIR (Standard Docker)
      if: github.event_name == 'push'
      run: |
        echo "${{ secrets.OCI_AUTH_TOKEN }}" | docker login ${OCIR_REGION_KEY}.ocir.io -u "${OCIR_NAMESPACE}/${OCI_CLI_USER}" --password-stdin

    - name: Build i push Docker slike
      if: github.event_name == 'push'
      run: |
        IMAGE="${OCIR_REGION_KEY}.ocir.io/${OCIR_NAMESPACE}/${OCIR_REPO}"
        docker build -t "${IMAGE}:${IMAGE_TAG}" -t "${IMAGE}:latest" .
        docker push "${IMAGE}:${IMAGE_TAG}"
        docker push "${IMAGE}:latest"
