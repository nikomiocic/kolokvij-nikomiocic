name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OCI_CLI_REGION: "eu-frankfurt-1"
  OCIR_REPO: "spring-projects/spring-boot-hello-app"

jobs:
  build-jar:
    name: Build Spring Boot JAR
    runs-on: ubuntu-latest
    steps:
    - name: Checkout koda
      uses: actions/checkout@v4

    - name: Postavi Java Environment
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Dozvola za pokretanje Maven Wrappera
      run: chmod +x mvnw

    - name: Izgradi paket s Mavenom
      run: ./mvnw clean package -DskipTests

    - name: Pohrani JAR kao Artifact
      uses: actions/upload-artifact@v4
      with:
        name: spring-boot-jar
        path: target/*.jar
        retention-days: 1

  build-image:
    name: Build and Push Docker Image
    needs: build-jar
    runs-on: ubuntu-latest
    steps:
    - name: Checkout koda
      uses: actions/checkout@v4

    - name: Preuzmi JAR Artifact
      uses: actions/download-artifact@v4
      with:
        name: spring-boot-jar
        path: target/

    - name: Postavi Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Prijava pomoću standardnog mehanizma i točnih podataka s tvojih slika
    - name: Prijava na Oracle Cloud Container Registry (OCIR)
      uses: docker/login-action@v3
      with:
        registry: ${{ env.OCI_CLI_REGION }}.ocir.io
        username: "${{ secrets.OCIR_NAMESPACE }}/${{ secrets.OCI_CLI_USER }}"
        password: ${{ secrets.OCI_AUTH_TOKEN }}

    - name: Izgradi i gurni Docker sliku
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.OCI_CLI_REGION }}.ocir.io/${{ secrets.OCIR_NAMESPACE }}/${{ env.OCIR_REPO }}:${{ github.sha }}
          ${{ env.OCI_CLI_REGION }}.ocir.io/${{ secrets.OCIR_NAMESPACE }}/${{ env.OCIR_REPO }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
